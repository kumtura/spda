name: Deploy SPDA (Laravel 12)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-spda
  cancel-in-progress: true

jobs:
  build-frontend:
    name: 🎨 Build Frontend Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  deploy-backend:
    name: 📦 Deploy Backend Files
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Sync Backend Core Files
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete --exclude='.env' --exclude='storage/' --exclude='bootstrap/cache/' --exclude='vendor/' --exclude='node_modules/' --exclude='public/' --exclude='.git/' --exclude='.github/'
          path: ./
          remote_path: domains/spda.kumtura.com/laravel_app/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: 65002

  deploy-frontend:
    name: 🎨 Deploy Frontend Files
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Sync Public Directory
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete --exclude='.htaccess' --exclude='index.php' --exclude='storage'
          path: public/
          remote_path: domains/spda.kumtura.com/public_html/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: 65002

  install-dependencies:
    name: 📚 Install Composer Dependencies
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    steps:
      - name: Initialize Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          command_timeout: 10m
          script: |
            # Ensure directories exist
            mkdir -p domains/spda.kumtura.com/laravel_app
            mkdir -p domains/spda.kumtura.com/public_html
            
            cd domains/spda.kumtura.com/laravel_app || exit
            
            # Create .env if it doesn't exist
            if [ ! -f .env ]; then
                if [ -f .env.example ]; then
                    cp .env.example .env
                else
                    touch .env
                fi
                
                # Update DB credentials from secrets or provided values
                sed -i 's/DB_DATABASE=.*/DB_DATABASE=u450002411_spda/' .env
                sed -i 's/DB_USERNAME=.*/DB_USERNAME=u450002411_spda/' .env
                sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=Tohjaya2025/' .env
                sed -i 's/APP_URL=.*/APP_URL=https:\/\/spda.kumtura.com/' .env
                
                echo "APP_NAME=SPDA" >> .env
                echo "APP_ENV=production" >> .env
                echo "APP_DEBUG=false" >> .env
                
                php artisan key:generate
            fi

      - name: Install Composer Packages
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          command_timeout: 10m
          script: |
            cd domains/spda.kumtura.com/laravel_app || exit
            composer install --no-dev --optimize-autoloader --no-interaction

  run-migrations:
    name: 🗄️ Run Database Migrations
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - name: Execute Migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          command_timeout: 10m
          script: |
            cd domains/spda.kumtura.com/laravel_app || exit
            php artisan migrate --force

  optimize-laravel:
    name: ⚡ Optimize Laravel Cache
    runs-on: ubuntu-latest
    needs: [run-migrations, deploy-frontend]
    steps:
      - name: Clear and Cache Laravel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          command_timeout: 10m
          script: |
            cd domains/spda.kumtura.com/laravel_app || exit
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

  setup-storage-links:
    name: 🔗 Setup Storage Links
    runs-on: ubuntu-latest
    needs: [optimize-laravel]
    steps:
      - name: Create Storage Symlinks
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          command_timeout: 10m
          script: |
            cd domains/spda.kumtura.com/laravel_app || exit
            php artisan storage:link
            if [ -L "public/storage" ]; then
                rm -f ../public_html/storage
                mv public/storage ../public_html/storage
            fi
